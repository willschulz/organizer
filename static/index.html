<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fbf9f4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#161614" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="/manifest.webmanifest">
<script src="/static/vendor/Sortable.min.js"></script>
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Organizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Light theme (default) */
    --bg:           #fbf9f4;
    --bg-elevated:  #ffffff;
    --bg-hover:     #f1eee5;
    --bg-row:       #fafaf7;
    --border:       #e3dfd5;
    --border-soft:  #ede9df;
    --text:         #1c1b18;
    --text-muted:   #6b6964;
    --text-faint:   #9b988f;
    --accent:       #8a3324;     /* warm rust */
    --accent-soft:  #f5e7e3;
    --blocker-bg:   #fff3ef;
    --blocker-bar:  #c0473a;
    --green:        #4a8a3a;
    --inprogress-color: #7c4daa;
    --inprogress-bg:    #f4eefa;
    --inprogress-bar:   #7c4daa;
    --shadow:       0 1px 2px rgba(28, 27, 24, 0.04), 0 4px 12px rgba(28, 27, 24, 0.05);
    --shadow-card:  0 1px 3px rgba(28, 27, 24, 0.06), 0 6px 20px rgba(28, 27, 24, 0.04);

    --radius:       12px;
    --radius-sm:    8px;
    --card-w:       300px;
    --card-min-h:   300px;
    --bar-h:        56px;

    --serif:        ui-serif, "Iowan Old Style", "Charter", "Georgia", serif;
    --sans:         -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", Helvetica, Arial, sans-serif;

    --sat: env(safe-area-inset-top, 0px);
    --sar: env(safe-area-inset-right, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:           #161614;
      --bg-elevated:  #1f1e1b;
      --bg-hover:     #292723;
      --bg-row:       #1a1916;
      --border:       #34322d;
      --border-soft:  #2a2925;
      --text:         #e9e6dd;
      --text-muted:   #a09c92;
      --text-faint:   #6b6862;
      --accent:       #d99a8b;
      --accent-soft:  #3a2622;
      --blocker-bg:   #2e1c19;
      --blocker-bar:  #d4604f;
      --green:        #7cb96a;
      --inprogress-color: #b88de0;
      --inprogress-bg:    #2a1b38;
      --inprogress-bar:   #b88de0;
      --shadow:       0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
      --shadow-card:  0 1px 3px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.5);
    }
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  body { min-height: 100dvh; }

  /* ---- Top bar ---- */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border-soft);
    padding-top: var(--sat);
  }
  #topbar-inner {
    height: var(--bar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 calc(20px + var(--sar)) 0 calc(20px + var(--sal));
    max-width: 1600px;
    margin: 0 auto;
  }
  #title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    flex: 1;
  }
  #status {
    font-size: 12px;
    color: var(--text-faint);
  }
  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s, color .15s, transform .1s;
  }
  .btn-icon:hover  { background: var(--bg-hover); color: var(--text); }
  .btn-icon:active { transform: scale(0.95); }
  .btn-icon svg { width: 18px; height: 18px; }

  /* ---- App container ---- */
  #app {
    padding: 24px calc(0px + var(--sar)) calc(48px + var(--sab)) calc(0px + var(--sal));
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ---- Category row ---- */
  .row {
    margin-bottom: 28px;
  }
  .row-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 0 28px 10px;
  }
  .row-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--text);
  }
  .row-count {
    font-size: 12px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .row-track {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: visible;
    gap: 14px;
    padding: 8px 28px 14px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    align-items: flex-start;
  }
  .row-track::-webkit-scrollbar { height: 8px; }
  .row-track::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  /* ---- Project card ---- */
  .card {
    flex: 0 0 var(--card-w);
    width: var(--card-w);
    min-height: var(--card-min-h);
    align-self: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    scroll-snap-align: start;
    transition: box-shadow .15s, transform .15s, border-color .15s;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border);
    box-shadow: 0 1px 3px rgba(28,27,24,0.08), 0 12px 28px rgba(28,27,24,0.07);
  }
  .card.add-card {
    align-items: center;
    justify-content: center;
    color: var(--text-faint);
    background: transparent;
    border: 1px dashed var(--border);
    box-shadow: none;
    cursor: pointer;
    min-height: var(--card-min-h);
  }
  .card.add-card:hover {
    color: var(--text-muted);
    border-color: var(--text-faint);
    background: var(--bg-row);
  }

  .card-header {
    padding: 16px 16px 10px;
    border-bottom: 1px solid var(--border-soft);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 8px;
    align-items: start;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1.25;
    outline: none;
    min-width: 0;
    word-break: break-word;
    cursor: text;
  }
  .card-title:focus {
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 1px 4px;
    margin: -1px -4px;
  }
  .card-cog {
    grid-column: 2;
    grid-row: 1 / span 2;
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px;
    align-self: start;
    transition: color .15s, transform .15s;
  }
  .card-cog:hover  { color: var(--text); }
  .card-cog:active { transform: rotate(60deg); }
  .card-cog svg { width: 18px; height: 18px; display: block; }

  .card-deadline {
    grid-column: 1;
    grid-row: 2;
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .card-deadline.due-soon {
    color: var(--blocker-bar);
    font-weight: 600;
  }
  .card-deadline.overdue {
    color: var(--blocker-bar);
    font-weight: 700;
  }
  .card-deadline-blank {
    color: var(--text-faint);
    font-style: italic;
    font-size: 11px;
  }

  /* ---- Todo list ---- */
  .todos {
    padding: 6px 0;
  }

  .todo {
    display: grid;
    grid-template-columns: 14px 24px 1fr auto;
    align-items: start;
    gap: 6px;
    padding: 7px 14px 7px 10px;
    border-bottom: 1px solid var(--border-soft);
    position: relative;
  }
  .todo:last-child { border-bottom: none; }
  .todo.is-blocker {
    background: var(--blocker-bg);
    border-left: 3px solid var(--blocker-bar);
    padding-left: 7px;
  }
  .todo.completed {
    opacity: 0.45;
  }
  .todo.completed .todo-text {
    text-decoration: line-through;
  }

  .todo-check {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    margin-top: 2px;
    border: 1.5px solid var(--text-faint);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
    position: relative;
  }
  .todo-check:hover { border-color: var(--text-muted); }
  .todo-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .todo-check:checked::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 5px;
    width: 4px;
    height: 8px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .todo.is-blocker .todo-check:not(:checked) {
    border-color: var(--blocker-bar);
    background: var(--bg-elevated);
  }

  .todo.in-progress:not(.completed) {
    background: var(--inprogress-bg);
    border-left: 3px solid var(--inprogress-bar);
    padding-left: 7px;
  }
  .todo.is-blocker.in-progress:not(.completed) {
    background: color-mix(in srgb, var(--inprogress-bg) 60%, var(--blocker-bg));
  }
  .todo.in-progress:not(.completed) .todo-check:not(:checked) {
    background: var(--inprogress-color);
    border-color: var(--inprogress-color);
  }
  .todo.in-progress:not(.completed) .todo-check:not(:checked)::after {
    content: "";
    position: absolute;
    inset: 3px 3px 3px 4px;
    background: white;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
  }

  .todo-play-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s, color .15s;
  }
  .todo-play-btn svg { width: 14px; height: 14px; }
  .todo-play-btn:hover { color: var(--text); background: var(--bg-hover); }
  .todo:hover .todo-play-btn,
  .todo:focus-within .todo-play-btn { opacity: 1; }
  .todo.in-progress .todo-play-btn {
    opacity: 0.7;
    color: var(--inprogress-color);
  }
  .todo.in-progress:hover .todo-play-btn,
  .todo.in-progress:focus-within .todo-play-btn { opacity: 1; }

  .todo-text {
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    word-break: break-word;
    outline: none;
    cursor: text;
    min-width: 0;
  }
  .todo.is-blocker .todo-text {
    font-weight: 600;
  }
  .todo-text:focus {
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 1px 4px;
    margin: -1px -4px;
  }

  .todo-right {
    grid-column: 3;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .todo-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s;
  }
  .todo:hover .todo-actions,
  .todo:focus-within .todo-actions { opacity: 1; }

  .todo-action-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .todo-action-btn:hover { color: var(--text); background: var(--bg-hover); }
  .todo-action-btn svg { width: 14px; height: 14px; }

  .todo-context-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .15s, color .15s;
  }
  .todo-context-btn svg { width: 14px; height: 14px; }
  .todo-context-btn:hover { color: var(--text); background: var(--bg-hover); }
  .todo:hover .todo-context-btn,
  .todo:focus-within .todo-context-btn { opacity: 1; }
  .todo.has-context .todo-context-btn {
    opacity: 0.55;
    color: var(--accent);
  }
  .todo.has-context:hover .todo-context-btn,
  .todo.has-context:focus-within .todo-context-btn { opacity: 1; }

  /* ---- Followup section ---- */
  .followups-toggle {
    width: 100%;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border-soft);
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color .15s, background .15s;
  }
  .followups-toggle:hover { color: var(--text-muted); background: var(--bg-row); }
  .followups-toggle.open  { color: var(--text-muted); }
  .followups-toggle .chev {
    transition: transform .2s;
    display: inline-block;
  }
  .followups-toggle.open .chev { transform: rotate(90deg); }
  .followups-list { display: none; }
  .followups-list.open { display: block; }
  .followups-list .todo { background: var(--bg-row); }

  /* ---- Add-todo input ---- */
  .add-todo {
    border-top: 1px solid var(--border-soft);
    padding: 8px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .add-todo input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    color: var(--text);
    padding: 4px 2px;
    width: 100%;
  }
  .add-todo input::placeholder { color: var(--text-faint); }
  .add-todo .add-mode {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .add-todo .pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-faint);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 9px;
    cursor: pointer;
    line-height: 1.4;
  }
  .add-todo .pill:hover { color: var(--text-muted); border-color: var(--text-faint); }
  .add-todo .pill.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ---- Empty state for add-card ---- */
  .add-card-inner {
    text-align: center;
  }
  .add-card-inner .plus {
    font-family: var(--serif);
    font-size: 32px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .add-card-inner .label {
    font-size: 13px;
  }

  /* ---- Modal (project metadata) ---- */
  dialog {
    border: none;
    background: var(--bg-elevated);
    color: var(--text);
    padding: 0;
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-width: 480px;
    width: calc(100% - 32px);
    max-height: 85dvh;
  }
  dialog::backdrop {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
  }
  .modal-form {
    display: flex;
    flex-direction: column;
    max-height: 85dvh;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-header h2 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }
  .modal-body {
    padding: 16px 20px;
    overflow-y: auto;
    display: grid;
    gap: 14px;
  }
  .modal-body label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .modal-body input,
  .modal-body select,
  .modal-body textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font: inherit;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .modal-body input:focus,
  .modal-body select:focus,
  .modal-body textarea:focus {
    border-color: var(--accent);
  }
  .modal-body textarea {
    min-height: 80px;
    resize: vertical;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .modal-body .help {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  /* Mode-aware visibility (project vs todo-context modes) */
  dialog.is-project-mode .todo-only,
  dialog.is-todo-mode    .project-only { display: none; }
  dialog.is-project-mode .paths-label-todo,
  dialog.is-todo-mode    .paths-label-project { display: none; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .modal-footer .btn {
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .modal-footer .btn:hover { background: var(--bg-hover); }
  .modal-footer .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .modal-footer .btn-primary:hover { filter: brightness(1.05); }
  .modal-footer .btn-danger {
    color: var(--blocker-bar);
    border-color: var(--border);
  }
  .modal-footer .btn-danger:hover {
    background: var(--blocker-bg);
    border-color: var(--blocker-bar);
  }

  .empty-state {
    padding: 48px 28px;
    text-align: center;
    color: var(--text-faint);
    font-family: var(--serif);
    font-size: 17px;
  }

  /* ---- Toast ---- */
  #toast {
    position: fixed;
    bottom: calc(20px + var(--sab));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 200;
  }
  #toast.show {
    opacity: 0.9;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- Nested sub-todos ---- */
  .subtodos {
    margin-left: 10px;
    padding-left: 8px;
    border-left: 1.5px solid var(--border-soft);
  }
  /* Visible drop slot when dragging: empty containers stay visible */
  .subtodos-drop-hint {
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    padding: 4px 14px;
    border-radius: var(--radius-sm);
    border: 1px dashed transparent;
    transition: border-color .15s, background .15s;
  }
  .card.drag-active .subtodos-drop-hint {
    border-color: var(--border);
    background: var(--bg-hover);
  }

  /* Drag handle affordance */
  .todo-drag-handle {
    cursor: grab;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    padding: 2px 2px 2px 0;
    opacity: 0;
    transition: opacity .15s;
    flex-shrink: 0;
    align-self: start;
    margin-top: 4px;
  }
  .todo-drag-handle svg { width: 12px; height: 12px; }
  .todo:hover .todo-drag-handle,
  .todo:focus-within .todo-drag-handle { opacity: 0.5; }
  .todo-drag-handle:hover { opacity: 1 !important; color: var(--text-muted); }

  /* SortableJS ghost/chosen states */
  .sortable-ghost {
    opacity: 0.35;
    background: var(--bg-hover) !important;
    border-radius: var(--radius-sm);
  }
  .sortable-chosen { cursor: grabbing; }

  /* Narrow screens: tighter padding */
  @media (max-width: 640px) {
    .row-header  { padding-left: 16px; padding-right: 16px; }
    .row-track   { padding-left: 16px; padding-right: 16px; }
    :root        { --card-w: 260px; }
  }
</style>
</head>
<body>
<header id="topbar">
  <div id="topbar-inner">
    <div id="title">Organizer</div>
    <span id="status"></span>
    <button class="btn-icon" id="btn-add-project" title="New project (any category)" aria-label="New project">

        <line x1="5" y1="12" x2="19" y2="12"/>

</header>

<main id="app">
  <div id="rows"></div>
</main>

<dialog id="project-modal">
  <form class="modal-form" id="project-form" method="dialog">
    <div class="modal-header">
      <h2 id="modal-title">Edit project</h2>
    </div>
    <div class="modal-body">
      <div class="project-only">
        <label for="f-name">Name</label>
        <input id="f-name" name="name" maxlength="200" autocomplete="off" />
      </div>
      <div class="project-only">
        <label for="f-category">Category</label>
        <select id="f-category" name="category">
          <option value="near_publication">Near-Publication</option>
          <option value="in_development">In-Development</option>
          <option value="early_stage">Early-Stage</option>

        </select>

      </div>

        <label for="f-paths"><span class="paths-label-project">Project filesystem paths</span><span class="paths-label-todo">Todo filesystem paths</span> <span style="font-weight: 400; text-transform: none; color: var(--text-faint);">(one per line; agent metadata, not shown on cards)</span></label>
        <textarea id="f-paths" name="paths" placeholder="projects/greenearth/like_biases/REPORT_draft3.md&#10;projects/greenearth/like_biases/jobs/"></textarea>
      </div>

        <label for="f-notes">Notes <span style="font-weight: 400; text-transform: none; color: var(--text-faint);">(markdown; agent-visible, not shown on cards)</span></label>

      </div>
    </div>
  </form>
</dialog>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const CATEGORY_LABELS = {
  near_publication: 'Near-Publication',
  in_development:   'In-Development',
  early_stage:      'Early-Stage',
  side_project:     'Side Projects',
};
const CATEGORY_ORDER = ['near_publication', 'in_development', 'early_stage', 'side_project'];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let state = {
  projects: { near_publication: [], in_development: [], early_stage: [], side_project: [] },
  followupsOpen: new Set(loadOpenFollowups()),  // set of project ids (strings)
  modalProjectId: null,
  modalTodoId: null,        // null => modal is in project mode
};

function loadOpenFollowups() {
  try { return JSON.parse(localStorage.getItem('organizer.openFollowups') || '[]'); }
  catch { return []; }
}
function saveOpenFollowups() {
  localStorage.setItem('organizer.openFollowups', JSON.stringify([...state.followupsOpen]));
}

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  if (!r.ok) {
    let detail = r.statusText;
    try { detail = (await r.json()).detail || detail; } catch {}
    throw new Error(`${method} ${path} -> ${r.status}: ${detail}`);
  }
  if (r.status === 204) return null;
  return r.json();
}

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------

let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg || '';
}

// ---------------------------------------------------------------------------
// Date helpers
// ---------------------------------------------------------------------------

function fmtDeadline(iso) {
  if (!iso) return null;
  // Parse YYYY-MM-DD as a local date (avoid TZ skew)
  const [y, m, d] = iso.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  if (isNaN(date)) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const days = Math.round((date - today) / 86400000);
  const month = date.toLocaleString('en-US', { month: 'short' });
  const dayLabel = `${month} ${date.getDate()}`;
  let cls = '';
  let suffix = '';
  if (days < 0)         { cls = 'overdue';  suffix = ` · ${Math.abs(days)}d overdue`; }
  else if (days === 0)  { cls = 'due-soon'; suffix = ' · today'; }
  else if (days <= 14)  { cls = 'due-soon'; suffix = ` · ${days}d`; }
  else                  {                  suffix = ` · ${days}d`; }
  return { text: dayLabel + suffix, cls };
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k === 'dataset') Object.assign(e.dataset, v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v === true ? '' : v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function svgIcon(d, opts = {}) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  if (opts.filled) {
    svg.setAttribute('fill', 'currentColor');
    svg.setAttribute('stroke', 'none');
  } else {
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
  }
  if (opts.size) { svg.setAttribute('width', opts.size); svg.setAttribute('height', opts.size); }
  // d can be a single path string or a semicolon-separated list of path strings
  for (const segment of d.split(';')) {
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', segment.trim());
    svg.appendChild(path);
  }
  return svg;
}
const ICONS = {
  cog:     'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm7.4-3a7.4 7.4 0 0 0-.1-1.3l2-1.6-2-3.4-2.4.8a7.4 7.4 0 0 0-2.2-1.3l-.4-2.5h-4l-.4 2.5a7.4 7.4 0 0 0-2.2 1.3l-2.4-.8-2 3.4 2 1.6a7.4 7.4 0 0 0 0 2.6l-2 1.6 2 3.4 2.4-.8a7.4 7.4 0 0 0 2.2 1.3l.4 2.5h4l.4-2.5a7.4 7.4 0 0 0 2.2-1.3l2.4.8 2-3.4-2-1.6c.1-.4.1-.9.1-1.3Z',
  trash:   'M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14ZM10 11v6M14 11v6',
  pin:     'M12 17v5M5 9l3-7h8l3 7-7 3-7-3Z',
  chevron: 'M9 6l6 6-6 6',
  note:    'M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5zM14 3v5h5M9 13h6M9 17h6',
  play:    'M6 4l12 8-12 8V4z',
  grip:    'M8 6h.01M8 12h.01M8 18h.01;M16 6h.01M16 12h.01M16 18h.01',
};

function render() {
  const root = document.getElementById('rows');
  root.replaceChildren();
  for (const cat of CATEGORY_ORDER) {
    root.appendChild(renderRow(cat, state.projects[cat] || []));
  }
}

function projectLastActivity(p) {
  // Returns the most recent ISO timestamp across all todo updated_at /
  // completed_at values, falling back to the project's own updated_at.
  let latest = p.updated_at || '';
  for (const t of (p.todos || [])) {
    if (t.updated_at   && t.updated_at   > latest) latest = t.updated_at;
    if (t.completed_at && t.completed_at > latest) latest = t.completed_at;
  }
  return latest;
}

function sortProjects(projects) {
  const withDeadline    = projects.filter(p => p.deadline);
  const withoutDeadline = projects.filter(p => !p.deadline);
  withDeadline.sort((a, b) => a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : 0);
  withoutDeadline.sort((a, b) => {
    const la = projectLastActivity(a);
    const lb = projectLastActivity(b);
    return lb < la ? -1 : lb > la ? 1 : 0; // descending: most-recent first
  });
  return [...withDeadline, ...withoutDeadline];
}

function renderRow(category, projects) {
  const visible = sortProjects(projects.filter(p => !p.archived));
  const track = el('div', { class: 'row-track' });
  for (const p of visible) track.appendChild(renderCard(p));
  track.appendChild(renderAddCard(category));
  return el('section', { class: 'row', dataset: { category } }, [
    el('div', { class: 'row-header' }, [
      el('div', { class: 'row-title' }, [CATEGORY_LABELS[category]]),
      el('div', { class: 'row-count' }, [`${visible.length} project${visible.length === 1 ? '' : 's'}`]),
    ]),
    track,
  ]);
}

function renderAddCard(category) {
  return el('div', {
    class: 'card add-card',
    role: 'button',
    tabindex: '0',
    onclick: () => openProjectModal(null, category),
    onkeydown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openProjectModal(null, category); } },
  }, [
    el('div', { class: 'add-card-inner' }, [
      el('div', { class: 'plus' }, ['+']),
      el('div', { class: 'label' }, ['New project']),
    ]),
  ]);
}

/**
 * Build a nested tree from the flat todos array using parent_id.
 * Returns an array of root nodes; each node has a `children` array.
 */
function buildTree(todos) {
  const byId = {};
  for (const t of todos) byId[t.id] = { ...t, children: [] };
  const roots = [];
  for (const t of todos) {
    if (t.parent_id != null && byId[t.parent_id]) {
      byId[t.parent_id].children.push(byId[t.id]);
    } else {
      roots.push(byId[t.id]);
    }
  }
  return roots;
}

/**
 * Walk the card DOM and collect {id, parent_id, display_order} for every todo,
 * re-indexing siblings in steps of 10. Used by persistDrag.
 */
function collectCardOrder(card) {
  const updates = [];

  function walk(container, parentId) {
    const rows = Array.from(container.children).filter(n => n.dataset && n.dataset.todoId);
    rows.forEach((row, i) => {
      const id = Number(row.dataset.todoId);
      updates.push({ id, parent_id: parentId ?? null, display_order: i * 10 });
      const sub = row.querySelector(':scope > .subtodos-wrap > .subtodos');
      if (sub) walk(sub, id);
    });
  }

  const mainList = card.querySelector('.todos');
  if (mainList) walk(mainList, null);

  const followupList = card.querySelector('.followups-list');
  if (followupList) walk(followupList, null);

  return updates;
}

async function persistDrag(card) {
  const updates = collectCardOrder(card);
  if (!updates.length) return;
  try {
    await api('POST', '/api/todos/reorder', updates);
    await reload();
  } catch (err) {
    toast(err.message);
    await reload();
  }
}

/**
 * Initialize SortableJS on a container element.
 * group: string shared by all containers that can exchange items.
 * card: the card DOM element used for persistDrag.
 */
function initSortable(container, group, card) {
  Sortable.create(container, {
    group,
    animation: 120,
    handle: '.todo-drag-handle',
    filter: '.subtodos-drop-hint',
    preventOnFilter: false,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    fallbackOnBody: true,
    swapThreshold: 0.65,
    onStart() { card.classList.add('drag-active'); },
    onEnd()   {
      card.classList.remove('drag-active');
      persistDrag(card);
    },
  });
}

function renderCard(project) {
  const card = el('div', { class: 'card', dataset: { projectId: project.id } });

  // Header
  const title = el('div', {
    class: 'card-title',
    contenteditable: 'true',
    spellcheck: 'false',
    onblur: (e) => commitTitleEdit(project.id, e.target.textContent),
    onkeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
  }, [project.name]);

  let deadlineEl;
  if (project.deadline) {
    const d = fmtDeadline(project.deadline);
    deadlineEl = el('div', { class: `card-deadline ${d ? d.cls : ''}` }, [d ? d.text : project.deadline]);
  } else {
    deadlineEl = el('div', { class: 'card-deadline card-deadline-blank' }, ['no deadline']);
  }

  const cog = el('button', {
    class: 'card-cog',
    type: 'button',
    title: 'Edit project',
    'aria-label': 'Edit project',
    onclick: () => openProjectModal(project.id),
  });
  cog.appendChild(svgIcon(ICONS.cog));

  card.appendChild(el('div', { class: 'card-header' }, [title, deadlineEl, cog]));

  // Build tree and split into main vs followup.
  const todos = project.todos || [];
  const mainTodos    = todos.filter(t => !t.is_followup);
  const followupTodos = todos.filter(t => t.is_followup);

  const mainRoots    = buildTree(mainTodos);
  const followupRoots = buildTree(followupTodos);

  const mainGroup    = `todos-${project.id}`;
  const followupGroup = `followups-${project.id}`;

  // Main todo list
  const todoList = el('div', { class: 'todos' });
  for (const node of mainRoots) {
    todoList.appendChild(renderTodoNode(node, mainGroup, card));
  }
  card.appendChild(todoList);
  initSortable(todoList, mainGroup, card);

  // Followups (collapsible)
  if (followupTodos.length > 0) {
    const isOpen = state.followupsOpen.has(String(project.id));
    const toggleBtn = el('button', {
      class: `followups-toggle ${isOpen ? 'open' : ''}`,
      type: 'button',
      onclick: () => {
        const key = String(project.id);
        if (state.followupsOpen.has(key)) state.followupsOpen.delete(key);
        else state.followupsOpen.add(key);
        saveOpenFollowups();
        render();
      },
    }, [
      el('span', { class: 'chev' }, ['›']),
      el('span', {}, [`Then… (${followupTodos.length})`]),
    ]);
    card.appendChild(toggleBtn);
    const list = el('div', { class: `followups-list ${isOpen ? 'open' : ''}` });
    for (const node of followupRoots) {
      list.appendChild(renderTodoNode(node, followupGroup, card));
    }
    card.appendChild(list);
    initSortable(list, followupGroup, card);
  }

  // Add-todo input
  card.appendChild(renderAddTodoInput(project));

  return card;
}

function todoHasContext(t) {
  return (t.notes && t.notes.trim()) || (Array.isArray(t.paths) && t.paths.length > 0);
}

/**
 * Render a single todo row plus its children recursively.
 * node: a todo object augmented with a `children` array (from buildTree).
 * group: the SortableJS group string for this subtree's parent container.
 * card: the card DOM element, needed for persistDrag.
 */
function renderTodoNode(node, group, card) {
  const t = node;
  const hasCtx = todoHasContext(t);

  const row = el('div', {
    class: [
      'todo',
      t.is_blocker ? 'is-blocker' : '',
      t.in_progress && !t.completed ? 'in-progress' : '',
      t.completed ? 'completed' : '',
      hasCtx ? 'has-context' : '',
    ].filter(Boolean).join(' '),
    dataset: { todoId: t.id },
  });

  // Drag handle (column 1)
  const handle = el('div', { class: 'todo-drag-handle', title: 'Drag to reorder or nest' });
  handle.appendChild(svgIcon(ICONS.grip, { size: 12 }));
  row.appendChild(handle);

  // Checkbox (column 2)
  const check = el('input', {
    class: 'todo-check',
    type: 'checkbox',
    onchange: async (e) => {
      const want = e.target.checked;
      try {
        const result = await api('POST', `/api/todos/${t.id}/${want ? 'complete' : 'uncomplete'}`);
        Object.assign(t, result);
        row.replaceWith(renderTodoNode(t, group, card));
      } catch (err) {
        e.target.checked = !want;
        toast(err.message);
      }
    },
  });
  if (t.completed) check.checked = true;
  row.appendChild(check);

  // Text (column 3)
  const text = el('div', {
    class: 'todo-text',
    contenteditable: 'true',
    spellcheck: 'false',
    onblur: (e) => commitTodoText(t, e.target.textContent),
    onkeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
  }, [t.text]);
  row.appendChild(text);

  // Right-hand actions (column 4)
  const right = el('div', { class: 'todo-right' });

  if (!t.completed) {
    const playBtn = el('button', {
      class: 'todo-play-btn',
      type: 'button',
      title: t.in_progress ? 'Mark as not in progress' : 'Mark as in progress',
      'aria-label': t.in_progress ? 'Unmark in progress' : 'Mark in progress',
      onclick: async () => {
        try {
          const result = await api('PATCH', `/api/todos/${t.id}`, { in_progress: !t.in_progress });
          Object.assign(t, result);
          row.replaceWith(renderTodoNode({ ...t, children: node.children }, group, card));
        } catch (err) { toast(err.message); }
      },
    });
    playBtn.appendChild(svgIcon(ICONS.play, { size: 14, filled: true }));
    right.appendChild(playBtn);
  }

  const ctxBtn = el('button', {
    class: 'todo-context-btn',
    type: 'button',
    title: hasCtx ? 'Edit context (paths/notes)' : 'Add context (paths/notes)',
    'aria-label': hasCtx ? 'Edit todo context' : 'Add todo context',
    onclick: () => openTodoContextModal(t),
  });
  ctxBtn.appendChild(svgIcon(ICONS.note, { size: 14 }));
  right.appendChild(ctxBtn);

  const actions = el('div', { class: 'todo-actions' });
  const blockerBtn = el('button', {
    class: 'todo-action-btn',
    type: 'button',
    title: t.is_blocker ? 'Unmark as blocker' : 'Mark as blocker',
    'aria-label': t.is_blocker ? 'Unmark as blocker' : 'Mark as blocker',
    onclick: async () => {
      try {
        await api('PATCH', `/api/todos/${t.id}`, { is_blocker: !t.is_blocker });
        await reload();
      } catch (err) { toast(err.message); }
    },
  });
  blockerBtn.appendChild(svgIcon(ICONS.pin, { size: 14 }));
  actions.appendChild(blockerBtn);

  const delBtn = el('button', {
    class: 'todo-action-btn',
    type: 'button',
    title: 'Delete',
    'aria-label': 'Delete',
    onclick: async () => {
      if (!confirm('Delete this todo?')) return;
      try {
        await api('DELETE', `/api/todos/${t.id}`);
        await reload();
      } catch (err) { toast(err.message); }
    },
  });
  delBtn.appendChild(svgIcon(ICONS.trash, { size: 14 }));
  actions.appendChild(delBtn);

  right.appendChild(actions);
  row.appendChild(right);

  // Children subtodos container (spans all columns via a wrapper below the row grid)
  if (node.children && node.children.length > 0 || true) {
    const subtodosContainer = el('div', { class: 'subtodos' });
    const dropHint = el('div', { class: 'subtodos-drop-hint' }, ['drop here to nest']);
    subtodosContainer.appendChild(dropHint);
    for (const child of (node.children || [])) {
      subtodosContainer.appendChild(renderTodoNode(child, group, card));
    }
    const wrap = el('div', {
      class: 'subtodos-wrap',
      style: 'grid-column: 1 / -1;',
    }, [subtodosContainer]);
    row.appendChild(wrap);
    initSortable(subtodosContainer, group, card);
  }

  return row;
}

function renderAddTodoInput(project) {
  let mode = 'todo';   // 'todo' | 'blocker' | 'followup'
  const wrap = el('div', { class: 'add-todo' });

  const input = el('input', {
    type: 'text',
    placeholder: 'Add todo…',
    'aria-label': 'Add todo',
    onkeydown: async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        try {
          await api('POST', '/api/todos', {
            project_id: project.id,
            text,
            is_blocker: mode === 'blocker',
            is_followup: mode === 'followup',
          });
          input.value = '';
          await reload();
        } catch (err) { toast(err.message); }
      }
    },
  });

  function setMode(m) {
    mode = m;
    pillTodo.classList.toggle('active', m === 'todo');
    pillBlocker.classList.toggle('active', m === 'blocker');
    pillFollowup.classList.toggle('active', m === 'followup');
    input.placeholder = m === 'blocker' ? 'Add blocker…'
                       : m === 'followup' ? 'Add follow-up…'
                       : 'Add todo…';
  }
  const pillTodo     = el('button', { type: 'button', class: 'pill active', title: 'Todo',         onclick: () => setMode('todo') },     ['Todo']);
  const pillBlocker  = el('button', { type: 'button', class: 'pill',        title: 'Blocker',      onclick: () => setMode('blocker') },  ['Blocker']);
  const pillFollowup = el('button', { type: 'button', class: 'pill',        title: 'Then / later', onclick: () => setMode('followup') }, ['Then']);

  wrap.appendChild(input);
  wrap.appendChild(el('div', { class: 'add-mode' }, [pillTodo, pillBlocker, pillFollowup]));
  return wrap;
}

// ---------------------------------------------------------------------------
// Mutations
// ---------------------------------------------------------------------------

async function commitTitleEdit(projectId, newName) {
  const proj = findProject(projectId);
  newName = (newName || '').trim();
  if (!proj) return;
  if (!newName) {
    toast('Project name cannot be empty');
    await reload();
    return;
  }
  if (newName === proj.name) return;
  try {
    await api('PATCH', `/api/projects/${projectId}`, { name: newName });
    proj.name = newName;
  } catch (err) { toast(err.message); await reload(); }
}

async function commitTodoText(t, newText) {
  newText = (newText || '').trim();
  if (!newText) {
    if (confirm('Empty text — delete this todo?')) {
      await api('DELETE', `/api/todos/${t.id}`);
      await reload();
    } else {
      await reload();
    }
    return;
  }
  if (newText === t.text) return;
  try {
    const result = await api('PATCH', `/api/todos/${t.id}`, { text: newText });
    Object.assign(t, result);
  } catch (err) { toast(err.message); await reload(); }
}

function findProject(projectId) {
  for (const cat of CATEGORY_ORDER) {
    const hit = (state.projects[cat] || []).find(p => p.id === projectId);
    if (hit) return hit;
  }
  return null;
}

// ---------------------------------------------------------------------------
// Modal
// ---------------------------------------------------------------------------

const modal = document.getElementById('project-modal');
const modalForm = document.getElementById('project-form');
const fName = document.getElementById('f-name');
const fCategory = document.getElementById('f-category');
const fDeadline = document.getElementById('f-deadline');
const fPaths = document.getElementById('f-paths');
const fNotes = document.getElementById('f-notes');
const fDelete = document.getElementById('f-delete');
const fCancel = document.getElementById('f-cancel');
const fSave   = document.getElementById('f-save');
const fTodoText = document.getElementById('f-todo-text');

function setModalMode(mode) {
  modal.classList.toggle('is-project-mode', mode === 'project');
  modal.classList.toggle('is-todo-mode',    mode === 'todo');
}

function openProjectModal(projectId, defaultCategory) {
  state.modalProjectId = projectId;
  state.modalTodoId = null;
  setModalMode('project');
  if (projectId == null) {
    document.getElementById('modal-title').textContent = 'New project';
    fName.value = '';
    fCategory.value = defaultCategory || 'near_publication';
    fDeadline.value = '';
    fPaths.value = '';
    fNotes.value = '';
    fDelete.style.display = 'none';
  } else {
    const p = findProject(projectId);
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Edit project';
    fName.value = p.name;
    fCategory.value = p.category;
    fDeadline.value = p.deadline || '';
    fPaths.value = (p.paths || []).join('\n');
    fNotes.value = p.notes || '';
    fDelete.style.display = '';
  }
  modal.showModal();
  setTimeout(() => fName.focus(), 30);
}

function openTodoContextModal(todo) {
  state.modalProjectId = null;
  state.modalTodoId = todo.id;
  setModalMode('todo');
  document.getElementById('modal-title').textContent = 'Todo context';
  fTodoText.textContent = todo.text || '';
  fPaths.value = (todo.paths || []).join('\n');
  fNotes.value = todo.notes || '';
  modal.showModal();
  setTimeout(() => fPaths.focus(), 30);
}

modalForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    if (state.modalTodoId != null) {
      const payload = {
        notes: fNotes.value,
        paths: fPaths.value.split('\n').map(s => s.trim()).filter(Boolean),
      };
      await api('PATCH', `/api/todos/${state.modalTodoId}`, payload);
      toast('Saved');
    } else {
      const payload = {
        name: fName.value.trim(),
        category: fCategory.value,
        deadline: fDeadline.value || null,
        deadline_set: true,
        notes: fNotes.value,
        paths: fPaths.value.split('\n').map(s => s.trim()).filter(Boolean),
      };
      if (!payload.name) { toast('Name required'); return; }
      if (state.modalProjectId == null) {
        await api('POST', '/api/projects', payload);
        toast('Created');
      } else {
        await api('PATCH', `/api/projects/${state.modalProjectId}`, payload);
        toast('Saved');
      }
    }
    modal.close();
    await reload();
  } catch (err) { toast(err.message); }
});

fCancel.addEventListener('click', () => modal.close());

fDelete.addEventListener('click', async () => {
  if (state.modalProjectId == null) return;
  const p = findProject(state.modalProjectId);
  if (!p) return;
  if (!confirm(`Delete "${p.name}" and all its todos?`)) return;
  try {
    await api('DELETE', `/api/projects/${state.modalProjectId}`);
    toast('Deleted');
    modal.close();
    await reload();
  } catch (err) { toast(err.message); }
});

document.getElementById('btn-add-project').addEventListener('click', () => openProjectModal(null));

// ---------------------------------------------------------------------------
// Bootstrapping
// ---------------------------------------------------------------------------

async function reload() {
  setStatus('Loading…');
  try {
    const data = await api('GET', '/api/projects');
    state.projects = data.projects || {};
    for (const cat of CATEGORY_ORDER) state.projects[cat] = state.projects[cat] || [];
    setStatus('');
    render();
  } catch (err) {
    setStatus('offline');
    toast(err.message);
  }
}

reload();
</script>
</body>
</html>
